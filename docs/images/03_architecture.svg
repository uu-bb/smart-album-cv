<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">智能相册系统架构</title>
  <desc id="desc">展示摄像头采集、PyQt5 主界面、相册管理、图像处理、AI 功能以及 MySQL 到 SQLite 降级路径。</desc>
  <defs>
    <style>
      .title { font: 700 30px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #f8fafc; }
      .section { font: 700 20px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #f8fafc; }
      .detail { font: 15px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #cbd5e1; }
      .label { font: 600 16px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #dbeafe; }
      .box { fill: #273449; stroke: #60a5fa; stroke-width: 2; rx: 14; }
      .box-accent { fill: #1f3b46; stroke: #34d399; stroke-width: 2; rx: 14; }
      .box-warn { fill: #443527; stroke: #fbbf24; stroke-width: 2; rx: 14; }
      .line { fill: none; stroke: #94a3b8; stroke-width: 2.5; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #fbbf24; stroke-width: 2.5; stroke-dasharray: 8 7; marker-end: url(#arrow-warn); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="1200" height="680" fill="#111827"/>
  <text x="600" y="55" text-anchor="middle" class="title">智能相册系统架构</text>

  <rect x="55" y="120" width="245" height="105" class="box"/>
  <text x="177" y="157" text-anchor="middle" class="section">摄像头采集</text>
  <text x="177" y="187" text-anchor="middle" class="detail">cv2.VideoCapture</text>
  <text x="177" y="210" text-anchor="middle" class="detail">DirectShow</text>

  <rect x="380" y="105" width="270" height="135" class="box-accent"/>
  <text x="515" y="153" text-anchor="middle" class="section">PyQt5 主界面</text>
  <text x="515" y="184" text-anchor="middle" class="detail">实时预览 · 照片浏览</text>
  <text x="515" y="209" text-anchor="middle" class="detail">QThread · 信号槽 · 线程池</text>

  <rect x="760" y="95" width="380" height="95" class="box"/>
  <text x="950" y="132" text-anchor="middle" class="section">相册管理与视频生成</text>
  <text x="950" y="162" text-anchor="middle" class="detail">拍照 · 浏览 · 编辑 · 合成</text>

  <rect x="760" y="230" width="380" height="95" class="box"/>
  <text x="950" y="267" text-anchor="middle" class="section">图像处理</text>
  <text x="950" y="297" text-anchor="middle" class="detail">OpenCV · 美颜 · 瘦腿 · 滤镜</text>

  <rect x="760" y="365" width="380" height="125" class="box"/>
  <text x="950" y="402" text-anchor="middle" class="section">AI 功能</text>
  <text x="950" y="434" text-anchor="middle" class="detail">人脸编码 · 风格迁移 · 姿态估计</text>
  <text x="950" y="461" text-anchor="middle" class="detail">表情分类 · YOLO · 手势控制</text>

  <rect x="380" y="350" width="270" height="110" class="box"/>
  <text x="515" y="389" text-anchor="middle" class="section">数据访问层</text>
  <text x="515" y="420" text-anchor="middle" class="detail">统一相册元数据接口</text>
  <text x="515" y="444" text-anchor="middle" class="detail">故障时自动降级</text>

  <rect x="155" y="515" width="255" height="95" class="box-accent"/>
  <text x="282" y="552" text-anchor="middle" class="section">MySQL</text>
  <text x="282" y="582" text-anchor="middle" class="detail">首选外部数据库</text>

  <rect x="480" y="515" width="255" height="95" class="box-warn"/>
  <text x="607" y="552" text-anchor="middle" class="section">SQLite</text>
  <text x="607" y="582" text-anchor="middle" class="detail">本地后备存储</text>

  <rect x="805" y="535" width="290" height="75" class="box-warn"/>
  <text x="950" y="565" text-anchor="middle" class="label">模型缺失时保留基础相册功能</text>
  <text x="950" y="590" text-anchor="middle" class="detail">可选 AI 功能不阻断主流程</text>

  <path d="M300 172 H380" class="line"/>
  <path d="M650 145 H760" class="line"/>
  <path d="M650 177 C705 177 705 277 760 277" class="line"/>
  <path d="M650 210 C710 210 700 427 760 427" class="line"/>
  <path d="M515 240 V350" class="line"/>
  <path d="M470 460 C430 485 350 485 300 515" class="line"/>
  <path d="M555 460 C580 480 600 490 607 515" class="dash"/>
  <path d="M410 562 H480" class="dash"/>
  <path d="M950 490 V535" class="dash"/>

  <text x="442" y="493" text-anchor="end" class="detail">连接成功</text>
  <text x="572" y="493" class="detail">连接失败</text>
</svg>
